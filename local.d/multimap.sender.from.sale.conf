# Phishing Organisations, Brands and Products
# ------------------------------------------------------------------------------
sender.from.sale.orgbrandproduct {
  type = "header";
  header = "from";
  filter = "email:name";
  regexp = true;
  map = "https://raw.githubusercontent.com/martinschaible/rspamd-rules/main/maps.d/sender/sender.from.sale.orgbrandproduct.map";
  score = 12.0;
  symbol = "sender.from.sale.orgbrandproduct";
  description = "Sender: Sale Organisations, Brands and Products";
}
